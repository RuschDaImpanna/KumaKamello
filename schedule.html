<!DOCTYPE html>
<html lang="en">
    <head>

        <meta charset="UTF-8">
        <meta name="author" content="Rusch Da Impanna">
        <meta name="description" content="A way to organize your schedule by building blocks depending on available slots. Ideal for college schedules">

        <link rel="stylesheet" href="table.css">
        <link rel="stylesheet" href="blocks.css">
        <link rel="stylesheet" href="tableSettings.css">

        <title>Kuma Kamello</title>

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    </head>

    <body>

        <article class="schedule">

            <h1 id="tableTitle" style="text-align: center;"></h1>
            <br/>
            <div class="table"></div>
            <br/>
            <br/>
            <h6 id="errorLog" hidden>##ERROR##</h6>
            <br/>
            <div class="bottomArea">

                <div class="blocks drop"></div>

            </div>

        </article>

        <article class="settings">

            <div id="settingsTab">

                <h1>Schedule Settings</h1>

                <form id="files">

                <input type="file" id="import" accept=".json" hidden/>
                <button type="button" onclick="document.getElementById('import').click()">
                    Import
                </button>
                <button type="button" id="export" disabled>Export</button>

                </form>

                <br/>
                <br/>

                <form id="tableSettings">

                    <div id="title">

                    <h3>Title</h3>
                    <input type="text" name="title" placeholder="My Schedule" maxlength="64" oninput="dynamicText()">

                    </div>

                    <br/>

                    <div id="initDay">

                    <h3>Initial Day</h3>
                    <input type="radio" id="initM" name="initDay" value="0" checked>
                    <label for="initM">Monday</label>
                    <input type="radio" id="initT" name="initDay" value="1">
                    <label for="initT">Tuesday</label>
                    <input type="radio" id="initW" name="initDay" value="2">
                    <label for="initW">Wednesday</label>
                    <input type="radio" id="initTh" name="initDay" value="3">
                    <label for="initTh">Thursday</label>
                    <input type="radio" id="initF" name="initDay" value="4">
                    <label for="initF">Friday</label>
                    <input type="radio" id="initSt" name="initDay" value="5">
                    <label for="initSt">Saturday</label>
                    <input type="radio" id="initSn" name="initDay" value="6">
                    <label for="initSn">Sunday</label>

                    </div>

                    <br/>

                    <div id="endDay">

                    <h3>Final Day</h3>
                    <input type="radio" id="endM" name="finalDay" value="0">
                    <label for="endM">Monday</label>
                    <input type="radio" id="endT" name="finalDay" value="1">
                    <label for="endT">Tuesday</label>
                    <input type="radio" id="endW" name="finalDay" value="2">
                    <label for="endW">Wednesday</label>
                    <input type="radio" id="endTh" name="finalDay" value="3">
                    <label for="endTh">Thursday</label>
                    <input type="radio" id="endF" name="finalDay" value="4" checked>
                    <label for="endF">Friday</label>
                    <input type="radio" id="endSt" name="finalDay" value="5">
                    <label for="endSt">Saturday</label>
                    <input type="radio" id="endSn" name="finalDay" value="6">
                    <label for="endSn">Sunday</label>

                    </div>

                    <br/>

                    <div id="lapse">

                    <label for="initTime">Initial Hour</label>
                    <input type="time" name="initTime" value="07:00">
                    <label for="endTime">Ending Hour</label>
                    <input type="time" name="endTime" value="19:00">

                    </div>

                    <br/>

                    <div id="units">

                        <h3>Hour unit</h3>
                        <input type="radio" id="plusQuarter" name="units" value="0">
                        <label for="plusQuarter">45 min</label>
                        <input type="radio" id="fifty" name="units" value="1">
                        <label for="fifty">50 min</label>
                        <input type="radio" id="hour" name="units" value="2" checked>
                        <label for="hour">1 hour</label>

                        <h3>Add deadtime</h3>
                        <input type="checkbox" id="deadtime" name="deadtime" disabled>

                        <h3>24-hour based format</h3>
                        <input type="checkbox" id="format" name="format" checked>

                    </div>

                    <br/>

                    <div id="color">

                        <h3>Color</h3>
                        <input type="color" id="tableColor" name="color"  value="#6E97F7" oninput="dynamicColor()">

                    </div>

                    <input type="reset" id="reset" name="reset" value="Reset to default">
                    

                </form>

            </div>

            <div class="lineOpen"></div>
            <div id="openSettings">

                <div class="arrow"></div>
                <span>Schedule settings</span>

            </div>

        </article>

        <article class="classSettings">

            <h1>Class Settings</h1>

            <form id="classCreation">

                <button type="button" id="addClass">Add Class</button>

            </form>

            <div id="classManagement">

            </div>


        </article>

    </body>

    <script type="module" src="settings.js"></script>
    <script type="module" src="class.js"></script>
    <script type="module" src="section.js"></script>
    <script type="module" src="blocks.js"></script>
    <script type="module" src="movingBlocks.js"></script>
    <script type="module" src="export.js"></script>
    <script type="module" src="import.js"></script>

</html>
