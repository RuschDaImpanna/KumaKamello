<!DOCTYPE html>
<html lang="en">
    <head>

        <meta charset="UTF-8">
        <meta name="author" content="Rusch Da Impanna">
        <meta name="description" content="A way to organize your schedule by building blocks depending on available slots. Ideal for college schedules">

        <!--<link rel="stylesheet" href="../css/schedule.css">-->

        <title>Kuma Kamello</title>

    </head>

    <body>

        <article class="schedule">

            <div class="table">

                <h1 id="tableTitle"></h1>

            </div>
            <div class="blocks"></div>

        </article>

        <article class="settings">

            <form id="tableSettings">

                <div id="title">

                    <h3>Title</h3>
                    <input type="text" name="title" placeholder="My Schedule">

                </div>

                <br/>

                <div id="initDay">

                    <h3>Initial Day</h3>
                    <input type="radio" value="initM" name="initDay" checked>
                    <label for="initM">Monday</label>
                    <input type="radio" value="initT" name="initDay">
                    <label for="initT">Tuesday</label>
                    <input type="radio" value="initW" name="initDay">
                    <label for="initW">Wednesday</label>
                    <input type="radio" value="initTh" name="initDay">
                    <label for="initTh">Thursday</label>
                    <input type="radio" value="initF" name="initDay">
                    <label for="initF">Friday</label>
                    <input type="radio" value="initSt" name="initDay">
                    <label for="initSt">Saturday</label>
                    <input type="radio" value="initSn" name="initDay">
                    <label for="initSn">Sunday</label>

                </div>

                <br/>

                <div id="endDay">

                    <h3>Final Day</h3>
                    <input type="radio" name="finalDay">
                    <label for="endM">Monday</label>
                    <input type="radio" name="finalDay">
                    <label for="endT">Tuesday</label>
                    <input type="radio" name="finalDay">
                    <label for="endW">Wednesday</label>
                    <input type="radio" name="finalDay">
                    <label for="endTh">Thursday</label>
                    <input type="radio" name="finalDay" checked>
                    <label for="endF">Friday</label>
                    <input type="radio" name="finalDay">
                    <label for="endSt">Saturday</label>
                    <input type="radio" name="finalDay">
                    <label for="endSn">Sunday</label>

                </div>

                <br/>

                <div id="lapse">
                    <label for="initTime">Initial Hour</label>
                    <input type="time" name="initTime" value="07:00">
                    <label for="endTime">Ending Hour</label>
                    <input type="time" name="endTime" value="19:00">

                </div>

                <br/>

                <div id="units">

                    <h3>Hour unit</h3>
                    <input type="radio" name="units">
                    <label for="quarter">15 min</label>
                    <input type="radio" name="units">
                    <label for="half">30 min</label>
                    <input type="radio" name="units">
                    <label for="plusQuarter">45 min</label>
                    <input type="radio" name="units" checked>
                    <label for="hour">1 hour</label>
                    <input type="radio" name="units">
                    <label for="twoHours">2 hour</label>
                    <input type="radio" name="units">
                    <label for="threeHours">3 hour</label>
                    <input type="radio" name="units">
                    <label for="fiveHours">5 hour</label>

                </div>

                <br/>

                <input type="reset" id="reset" name="reset" value="Reset to default">
                

            </form>

        </article>

    </body>

    <script src="settings.js"></script>

</html>
